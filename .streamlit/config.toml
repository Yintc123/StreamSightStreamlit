# 修正 Docker 下檔案上傳失敗:
#   "Cannot request file URLs ... isServerConnected:true, isSessionInfoSet:false"
# 成因:容器內 appuser 家目錄為 /nonexistent(adduser --system 預設),
#       gatherUsageStats 開啟時 Streamlit 產生 NewSession 訊息會寫
#       ~/.streamlit/machine_id_v4 → PermissionError → NewSession 從未送達前端
#       → session 建不起來 → 上傳元件拒發請求(與 OS / 網路 / CORS 無關)。
# 關閉使用統計即完全跳過該寫檔(metrics_util._get_machine_id_v4 早退)。
[browser]
gatherUsageStats = false

# 主題設定(見 docs/specs/design-system.md 設計 Token)
[theme]
# 鎖定白天模式：未設 base 時 Streamlit 會跟隨瀏覽器 prefers-color-scheme 變暗
base = "light"
primaryColor = "#2563eb"
backgroundColor = "#ffffff"
secondaryBackgroundColor = "#f1f5f9"
textColor = "#0f172a"
font = "sans serif"
